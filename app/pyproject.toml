# Briefcase project for the Library Cleanup Mac app.
# Isolated from the root photo_cleanup package/CLI — it only DEPENDS on it.
[tool.briefcase]
project_name = "Library Cleanup"
bundle = "cz.vaskiscz"
version = "0.1.23"
license.file = "LICENSE"

[tool.briefcase.app.photocleanup]
formal_name = "Library Cleanup"
description = "On-device photo & video library cleanup"
long_description = "On-device dedup of photoshoots & videos plus work-screenshot and expired-utility triage for Apple Photos. Wraps the photo_cleanup backend (osxphotos + Apple Vision) in a local WebView app; nothing is uploaded."
icon = "src/photocleanup/resources/libraryclean"
sources = ["src/photocleanup"]
# The backend is reused as a library (built from the repo root), not forked.
requires = [
    # osxphotos pins bitmath<2.0.0, which is sdist-only on PyPI; briefcase
    # installs wheels-only, so we vendor a locally-built wheel for it.
    # (Relative paths resolve against this pyproject's directory, so the repo
    # builds from any clone location.)
    "./wheels/bitmath-1.4.0.1-py3-none-any.whl",
    # the backend package = the repo root
    "..",
    # local API service (binds to localhost only — nothing leaves the device)
    "fastapi>=0.137",
    "uvicorn>=0.49",
    # CA bundle for the self-updater's HTTPS calls to GitHub (bundled Python
    # can't rely on system CAs). Also pulled in transitively via osxphotos.
    "certifi",
]

[tool.briefcase.app.photocleanup.permission]
# -> NSPhotoLibraryUsageDescription, so the app can request Photos read-write
# access to remove the items you select (PhotoKit shows its own confirmation).
photo_library = "Library Cleanup removes only the duplicate and clutter photos and videos you select — each removal is confirmed by macOS and goes to Recently Deleted."

[tool.briefcase.app.photocleanup.macOS]
universal_build = false
# Hardened-runtime resource-access entitlement for Photos. Without it (or with the
# old wrong key `…photo_library = false`), the hardened runtime blocks PhotoKit, so
# the read-write authorization request never reaches TCC and no dialog appears.
# Correct key is `photos-library` (plural, hyphen), and it must be TRUE.
entitlement."com.apple.security.personal-information.photos-library" = true
# Strip dead weight osxphotos drags in (its interactive REPL / pretty-print /
# markdown / html tooling) that the app never imports at runtime — verified by
# running a full analyze and checking sys.modules. Saves ~60 MB.
# Only the osxphotos interactive-REPL cluster (loaded solely by `osxphotos repl`,
# never on `import osxphotos`) + build/test cruft. Do NOT remove osxphotos's
# data/util deps (mako, bs4, markdown*, etc.) — several are imported at load.
# Every entry here is validated by running a real analyze in the built app.
cleanup_paths = [
    "{app.formal_name}.app/Contents/Resources/app_packages/jedi",
    "{app.formal_name}.app/Contents/Resources/app_packages/jedi-*.dist-info",
    "{app.formal_name}.app/Contents/Resources/app_packages/parso",
    "{app.formal_name}.app/Contents/Resources/app_packages/ptpython",
    "{app.formal_name}.app/Contents/Resources/app_packages/prompt_toolkit",
    "{app.formal_name}.app/Contents/Resources/app_packages/objexplore",
    "{app.formal_name}.app/Contents/Resources/app_packages/rich_theme_manager",
    "{app.formal_name}.app/Contents/Resources/app_packages/pip",
    "{app.formal_name}.app/Contents/Resources/app_packages/PyObjCTest",
    "{app.formal_name}.app/Contents/Resources/app_packages/**/tests",
    "{app.formal_name}.app/Contents/Resources/app_packages/**/__pycache__",
    # embedded CPython stdlib weight we never use (test suite is ~32 MB)
    "{app.formal_name}.app/Contents/Frameworks/Python.framework/Versions/*/lib/python3.*/test",
    "{app.formal_name}.app/Contents/Frameworks/Python.framework/Versions/*/lib/python3.*/ensurepip",
]
requires = [
    "toga-cocoa~=0.4.0",
    "std-nslog~=1.0.0",
]

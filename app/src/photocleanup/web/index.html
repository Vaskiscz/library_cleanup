<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Everything is same-origin/loopback and self-contained. Lock the WebView
       down so a hypothetical injected string can't load remote code or exfiltrate
       (audit #13). style-src allows inline because the UI uses inline style attrs;
       img/media 'self' + data: cover thumbnails and the inlined SVG sprite. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; connect-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
  <title>Library Cleanup</title>
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <!-- inline SVG sprite: app icon + UI glyphs (no network, per the on-device rule) -->
  <svg width="0" height="0" aria-hidden="true" style="position:absolute">
    <defs>
      <linearGradient id="gCanvas" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#1ab6a6"/>
        <stop offset="0.55" stop-color="#1f9e86"/>
        <stop offset="1" stop-color="#2f9e5f"/>
      </linearGradient>
      <linearGradient id="gCanvasTop" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
        <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <clipPath id="frontClip"><rect x="268" y="260" width="489" height="489" rx="73"/></clipPath>
      <symbol id="appicon" viewBox="0 0 1024 1024">
        <rect x="88" y="88" width="848" height="848" rx="196" fill="url(#gCanvas)"/>
        <rect x="88" y="88" width="848" height="848" rx="196" fill="url(#gCanvasTop)"/>
        <g transform="rotate(-10 512 512)"><rect x="236" y="231" width="489" height="489" rx="73" fill="#fff" opacity="0.32"/></g>
        <g transform="rotate(6 512 512)"><rect x="294" y="278" width="489" height="489" rx="73" fill="#fff" opacity="0.6"/></g>
        <rect x="268" y="260" width="489" height="489" rx="73" fill="#fff"/>
        <g clip-path="url(#frontClip)">
          <circle cx="382" cy="382" r="60" fill="#15a89a"/>
          <path d="M268 749 L457 512 L613 749 Z" fill="#2f9e5f"/>
          <path d="M512 749 L668 559 L756 668 L756 749 Z" fill="#1f9e86"/>
        </g>
        <circle cx="743" cy="743" r="120" fill="#fff"/>
        <circle cx="743" cy="743" r="99" fill="#2e7d32"/>
        <path d="M694 743 L730 782 L795 704" fill="none" stroke="#fff" stroke-width="29" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="i-check" viewBox="0 0 24 24"><path d="M5 12 l5 5 l9 -10" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></symbol>
      <symbol id="i-x" viewBox="0 0 24 24"><path d="M6 6 L18 18 M18 6 L6 18" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/></symbol>
      <symbol id="i-heart" viewBox="0 0 24 24"><path d="M12 21 C-6 9 6 1 12 8 C18 1 30 9 12 21 Z" fill="currentColor"/></symbol>
      <symbol id="i-play" viewBox="0 0 24 24"><path d="M8 5 L19 12 L8 19 Z" fill="currentColor"/></symbol>
      <symbol id="i-lock" viewBox="0 0 24 24"><path d="M7 10 V8 a5 5 0 0 1 10 0 v2 M5 10 h14 v10 H5 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
      <symbol id="i-stack" viewBox="0 0 24 24"><rect x="7" y="7" width="13" height="13" rx="2.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 16 V6 a2 2 0 0 1 2 -2 h10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
      <symbol id="i-video" viewBox="0 0 24 24"><rect x="3" y="6" width="13" height="12" rx="2.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M16 10 L21 7 V17 L16 14 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
      <symbol id="i-shot" viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 8 h8 M8 12 h8 M8 16 h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
      <symbol id="i-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 7 V12 L15.5 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
      <symbol id="i-coffee" viewBox="0 0 24 24"><path d="M4 8 h13 v4.5 a5 5 0 0 1 -5 5 H9 a5 5 0 0 1 -5 -5 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M17 9 h2.2 a2.6 2.6 0 0 1 0 5.2 H17" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 2.5 q1 1 0 2.5 M12 2.5 q1 1 0 2.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    </defs>
  </svg>

  <div id="app"></div>
  <script src="/static/app.js"></script>
</body>
</html>
